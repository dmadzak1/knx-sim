# Demo house: two rooms, ten devices, every device type at least once
# (F-CFG-3). Individual addresses use line 1 for the living room and line 2
# for the bedroom; group addresses follow the same main-address-per-room
# convention (1/... for the living room, 2/... for the bedroom).

simulator:
  name: knx-sim-demo-house

devices:
  # --- Living room ---
  - type: wall_switch
    individual_address: "1.1.1"
    name: living_room_switch
    control_ga: "1/1/1"

  - type: switch
    individual_address: "1.1.2"
    name: living_room_lamp
    control_ga: "1/1/1"
    status_ga: "1/1/2"

  - type: dimmer
    individual_address: "1.1.3"
    name: living_room_dimmer
    switch_ga: "1/1/10"
    relative_dim_ga: "1/1/11"
    brightness_ga: "1/1/12"
    switch_status_ga: "1/1/13"
    brightness_status_ga: "1/1/14"

  - type: blind
    individual_address: "1.1.4"
    name: living_room_blind
    move_ga: "1/1/20"
    stop_ga: "1/1/21"
    position_ga: "1/1/22"
    position_status_ga: "1/1/23"
    moving_status_ga: "1/1/24"

  - type: thermostat
    individual_address: "1.1.5"
    name: living_room_thermostat
    temperature_ga: "1/1/30"
    setpoint_ga: "1/1/31"
    heating_demand_ga: "1/1/32"

  # --- Bedroom ---
  - type: wall_switch
    individual_address: "1.2.1"
    name: bedroom_switch
    control_ga: "1/2/1"

  - type: switch
    individual_address: "1.2.2"
    name: bedroom_lamp
    control_ga: "1/2/1"
    status_ga: "1/2/2"

  - type: blind
    individual_address: "1.2.3"
    name: bedroom_blind
    move_ga: "1/2/20"
    stop_ga: "1/2/21"
    position_ga: "1/2/22"
    position_status_ga: "1/2/23"
    moving_status_ga: "1/2/24"

  - type: thermostat
    individual_address: "1.2.4"
    name: bedroom_thermostat
    temperature_ga: "1/2/30"
    setpoint_ga: "1/2/31"
    heating_demand_ga: "1/2/32"

  - type: presence
    individual_address: "1.2.5"
    name: bedroom_presence
    presence_ga: "1/2/40"
    hold_time: 60.0
